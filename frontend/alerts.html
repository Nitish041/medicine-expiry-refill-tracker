<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Alerts • Medicine Tracker</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-gradient">

  <!-- NAVBAR -->
  <nav class="navbar fixed-top" 
    style="background: linear-gradient(90deg,#10b981,#059669); box-shadow:0 6px 18px rgba(0,0,0,.06); z-index: 100;">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="navbar-brand text-white fw-bold" href="dashboard.html">🏥 Medicine Tracker</a>

      <div class="d-none d-md-flex gap-2">
        <a class="btn btn-sm btn-outline-light" href="dashboard.html">Dashboard</a>
        <a class="btn btn-sm btn-outline-light" href="view_medicines.html">View Medicines</a>
        <a class="btn btn-sm btn-outline-light" href="add_medicine.html">Add Medicine</a>
        <a class="btn btn-sm btn-outline-light" href="suppliers.html">Suppliers</a>
        <a class="btn btn-sm btn-outline-light" href="scanner.html">Scanner</a>
      </div>

      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="text-white me-2 d-none d-md-inline"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logoutAndRedirect()">Logout</button>
        <button class="btn btn-light btn-sm d-md-none" id="mobileMenuBtn">Menu</button>
      </div>
    </div>
  </nav>

  <div class="fixed-top-spacer"></div>

  <!-- CONTENT -->
  <div class="container mt-4" style="position: relative; z-index: 10;">

    <h2 class="fw-bold" style="color: var(--green-main);">⚠️ Alerts & Reports</h2>
    <p class="text-muted">Automatically detects expiry, low stock, and items needing attention.</p>

    <!-- SUMMARY -->
    <div class="row g-3">

      <div class="col-md-4">
        <div class="card p-3 card-glow text-center">
          <h5 style="color: var(--green-main); font-weight: 700;">Expired</h5>
          <h3 id="expiredCount">0</h3>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3 text-center">
          <h5>Near Expiry (30 days)</h5>
          <h3 id="nearExpiryCount">0</h3>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3 text-center">
          <h5>Low Stock</h5>
          <h3 id="lowStockCount">0</h3>
        </div>
      </div>

    </div>

    <!-- DETAILS -->
    <div class="row mt-4 g-3">

      <!-- EXPIRED -->
      <div class="col-md-12">
        <div class="card p-3">
          <h5>Expired Medicines</h5>
          <div id="expiredList"></div>
        </div>
      </div>

      <!-- NEAR EXPIRY -->
      <div class="col-md-12">
        <div class="card p-3">
          <h5>Near Expiry (within 30 days)</h5>
          <div id="nearExpiryList"></div>
        </div>
      </div>

      <!-- LOW STOCK -->
      <div class="col-md-12">
        <div class="card p-3">
          <h5>Low Stock Medicines</h5>
          <div id="lowStockList"></div>
        </div>
      </div>

    </div>

  </div>

  <script src="js/app.js"></script>

  <script>
    async function loadAlerts() {
      try {
        const meds = await apiGet("/medicines");
        const today = new Date();

        let expired = [];
        let nearExpiry = [];
        let lowStock = [];

        meds.forEach(m => {
          const exp = new Date(m.expiry_date);
          const diffDays = (exp - today) / (1000 * 60 * 60 * 24);

          if (diffDays < 0) expired.push(m);
          else if (diffDays <= 30) nearExpiry.push(m);

          if (m.quantity <= m.reorder_level) lowStock.push(m);
        });

        // Update counters
        document.getElementById("expiredCount").textContent = expired.length;
        document.getElementById("nearExpiryCount").textContent = nearExpiry.length;
        document.getElementById("lowStockCount").textContent = lowStock.length;

        // Render lists
        renderList("expiredList", expired, "danger");
        renderList("nearExpiryList", nearExpiry, "warning");
        renderList("lowStockList", lowStock, "success");

      } catch (err) {
        console.error(err);
      }
    }

    function renderList(id, items, type) {
      const box = document.getElementById(id);
      if (!items.length) {
        box.innerHTML = `<div class="alert alert-info">No items found.</div>`;
        return;
      }

      let html = "";
      items.forEach(m => {
        html += `
          <div class="alert alert-${type}">
            <b>${m.name}</b>  
            (Batch: ${m.batch_no})  
            <br>
            Expiry: ${m.expiry_date.split('T')[0]}  
            <br>
            Quantity: ${m.quantity}
          </div>
        `;
      });

      box.innerHTML = html;
    }

    loadAlerts();
  </script>

</body>
</html>
