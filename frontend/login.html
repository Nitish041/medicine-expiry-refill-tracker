<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login • Medicine Tracker</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="page-gradient">

  <!-- Floating medicine elements -->
  <div class="float-element">💊</div>
  <div class="float-element">🩺</div>
  <div class="float-element">⚕️</div>
  <div class="float-element">🏥</div>

  <!-- 3D Cubes -->
  <div class="cube-wrapper" style="top: 15%; left: 8%;">
    <div class="cube">
      <div class="cube-face">💊</div>
      <div class="cube-face">🩺</div>
      <div class="cube-face">💉</div>
      <div class="cube-face">⚕️</div>
      <div class="cube-face">🏥</div>
      <div class="cube-face">🔬</div>
    </div>
  </div>

  <div class="cube-wrapper" style="top: 60%; right: 10%;">
    <div class="cube">
      <div class="cube-face">🧪</div>
      <div class="cube-face">💊</div>
      <div class="cube-face">🩹</div>
      <div class="cube-face">🏥</div>
      <div class="cube-face">⚕️</div>
      <div class="cube-face">🔬</div>
    </div>
  </div>

  <!-- ============================
       NAVBAR
  ============================= -->
  <nav class="navbar fixed-top" style="background: linear-gradient(90deg,#10b981,#059669); box-shadow:0 6px 18px rgba(0,0,0,.06); z-index: 100;">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="navbar-brand text-white fw-bold" href="welcome.html">🏥 Medicine Tracker</a>

      <div class="d-none d-md-flex gap-2">
        <a class="btn btn-sm btn-outline-light" href="welcome.html">Home</a>
      </div>
    </div>
  </nav>

  <div class="fixed-top-spacer"></div>

  <!-- ============================
       LOGIN CARD
  ============================= -->
  <div class="container mt-5" style="position: relative; z-index: 10;">
    <div class="row justify-content-center">
      <div class="col-md-5">

        <div class="card p-4 card-glow" style="backdrop-filter: blur(5px); background: rgba(255,255,255,0.95);">
          <h3 class="text-center mb-1" style="color: var(--green-main); font-weight: 800;">Welcome Back</h3>
          <p class="text-muted text-center small mb-4">Enter your credentials to access the dashboard.</p>

          <div class="mb-3">
            <label class="form-label fw-600">Username</label>
            <input id="username" class="form-control" placeholder="admin">
          </div>

          <div class="mb-3">
            <label class="form-label fw-600">Password</label>
            <input id="password" type="password" class="form-control" placeholder="admin123">
          </div>

          <button id="loginBtn" class="btn btn-primary w-100 mt-3" style="font-weight: 600; padding: 10px;">Login</button>

          <div id="msg" class="mt-3"></div>

          <hr class="my-3">
          <p class="text-center small text-muted">Demo credentials: <strong>admin / admin123</strong></p>
        </div>

      </div>
    </div>
  </div>

  <script src="js/app.js"></script>

  <script>
    document.getElementById("loginBtn").addEventListener("click", () => {
      const user = document.getElementById("username").value.trim();
      const pass = document.getElementById("password").value.trim();

      if (user === "" || pass === "") {
        showMsg(document.getElementById("msg"), "warning", "Please enter both fields.");
        return;
      }

      if (user === "admin" && pass === "admin123") {
        localStorage.setItem("mt_user", JSON.stringify({ username: user }));
        window.location.href = "dashboard.html";
      } else {
        showMsg(document.getElementById("msg"), "danger", "Invalid login. Try again.");
      }
    });
  </script>

</body>
</html>
