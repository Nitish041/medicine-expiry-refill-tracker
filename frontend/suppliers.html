<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Suppliers • Medicine Tracker</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="page-gradient">

  <!-- NAVBAR -->
  <nav class="navbar fixed-top" style="background: linear-gradient(90deg,#10b981,#059669); box-shadow:0 6px 18px rgba(0,0,0,.06); z-index: 100;">
    <div class="container d-flex align-items-center justify-content-between">
      <a class="navbar-brand text-white fw-bold" href="dashboard.html">🏥 Medicine Tracker</a>

      <div class="d-none d-md-flex gap-2">
        <a class="btn btn-sm btn-outline-light" href="dashboard.html">Dashboard</a>
        <a class="btn btn-sm btn-outline-light" href="view_medicines.html">View Medicines</a>
        <a class="btn btn-sm btn-outline-light" href="add_medicine.html">Add Medicine</a>
        <a class="btn btn-sm btn-outline-light" href="alerts.html">Alerts</a>
        <a class="btn btn-sm btn-outline-light" href="scanner.html">Scanner</a>
      </div>

      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="text-white me-2 d-none d-md-inline"></span>
        <button class="btn btn-outline-light btn-sm" onclick="logoutAndRedirect()">Logout</button>
        <button class="btn btn-light btn-sm d-md-none" type="button" id="mobileMenuBtn">Menu</button>
      </div>
    </div>
  </nav>

  <div class="fixed-top-spacer"></div>

  <!-- PAGE CONTENT -->
  <div class="container mt-4" style="position: relative; z-index: 10;">
    <div class="row g-3">
      <!-- ADD SUPPLIER FORM -->
      <div class="col-md-5">
        <div class="card p-3 card-glow">
          <h5 class="mb-3" style="color: var(--green-main); font-weight: 700;">🏢 Add Supplier</h5>
          <div id="supplierMsg"></div>

          <div class="mb-2">
            <label class="form-label fw-600">Supplier Name</label>
            <input id="s_name" class="form-control" placeholder="Alpha Pharma">
          </div>

          <div class="mb-2">
            <label class="form-label">Contact Number</label>
            <input id="s_contact" class="form-control" placeholder="9876543210">
          </div>

          <div class="mb-2">
            <label class="form-label">Email</label>
            <input id="s_email" class="form-control" placeholder="supplier@example.com">
          </div>

          <div class="mb-2">
            <label class="form-label">Address</label>
            <input id="s_address" class="form-control" placeholder="City, Street">
          </div>

          <div class="d-flex gap-2 mt-2">
            <button id="addSupplierBtn" class="btn btn-primary">Add Supplier</button>
            <button id="clearSupplierBtn" class="btn btn-outline-secondary">Clear</button>
          </div>
        </div>
      </div>

      <!-- SUPPLIERS TABLE -->
      <div class="col-md-7">
        <div class="card p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h5 class="mb-0">Suppliers</h5>
            <div>
              <input id="supplierSearch" class="form-control form-control-sm" placeholder="Search suppliers..." style="min-width:220px">
            </div>
          </div>

          <div class="table-responsive">
            <table class="table table-sm" id="suppliersTable">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Contact</th>
                  <th>Email</th>
                  <th>Address</th>
                  <th class="text-end">Actions</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div id="supTableMsg" class="mt-2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- EDIT SUPPLIER MODAL -->
  <div class="modal fade" id="editSupplierModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Supplier</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="editSupplierMsg"></div>
          <input id="edit_supplier_id" type="hidden">
          <div class="mb-2">
            <label class="form-label">Supplier Name</label>
            <input id="edit_s_name" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Contact</label>
            <input id="edit_s_contact" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Email</label>
            <input id="edit_s_email" class="form-control">
          </div>
          <div class="mb-2">
            <label class="form-label">Address</label>
            <input id="edit_s_address" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button id="saveSupplierEdit" class="btn btn-primary">Save changes</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>

  <script>
    const supTbody = document.querySelector('#suppliersTable tbody');
    const supTableMsg = document.getElementById('supTableMsg');

    // Load suppliers
    async function loadSuppliers() {
      supTbody.innerHTML = '';
      supTableMsg.innerHTML = '';
      try {
        const sups = await apiGet('/suppliers');
        if (!sups.length) {
          supTableMsg.innerHTML = '<div class="alert alert-info">No suppliers found. Add one using the form.</div>';
          return;
        }
        sups.forEach(s => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${escapeHtml(s.name)}</td>
            <td>${escapeHtml(s.contact || '')}</td>
            <td>${escapeHtml(s.email || '')}</td>
            <td>${escapeHtml(s.address || '')}</td>
            <td class="text-end">
              <button class="btn btn-sm btn-outline-primary editSupplierBtn" data-id="${s.supplier_id}">Edit</button>
              <button class="btn btn-sm btn-outline-danger ms-1 delSupplierBtn" data-id="${s.supplier_id}">Delete</button>
            </td>
          `;
          supTbody.appendChild(tr);
        });
      } catch (e) {
        console.error(e);
        supTableMsg.innerHTML = '<div class="alert alert-danger">Failed to load suppliers</div>';
      }
    }

    function escapeHtml(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Add supplier
    document.getElementById('addSupplierBtn').addEventListener('click', async () => {
      const data = {
        name: document.getElementById('s_name').value.trim(),
        contact: document.getElementById('s_contact').value.trim(),
        email: document.getElementById('s_email').value.trim(),
        address: document.getElementById('s_address').value.trim()
      };
      if (!data.name) { showMsg(document.getElementById('supplierMsg'), 'warning', 'Supplier name is required'); return; }
      try {
        const res = await fetch(API_BASE + '/suppliers', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(data)
        });
        const j = await res.json();
        if (!res.ok) throw new Error(j.error || 'Failed to add supplier');
        showMsg(document.getElementById('supplierMsg'), 'success', 'Supplier added');
        // clear form
        document.getElementById('s_name').value = '';
        document.getElementById('s_contact').value = '';
        document.getElementById('s_email').value = '';
        document.getElementById('s_address').value = '';
        loadSuppliers();
        // notify other tabs/pages (e.g., Add Medicine) to refresh supplier lists
        try { localStorage.setItem('mt_refresh_suppliers', Date.now()); } catch (e) {}
      } catch (e) {
        showMsg(document.getElementById('supplierMsg'), 'danger', e.message);
      }
    });

    // Clear form
    document.getElementById('clearSupplierBtn').addEventListener('click', () => {
      document.getElementById('s_name').value = '';
      document.getElementById('s_contact').value = '';
      document.getElementById('s_email').value = '';
      document.getElementById('s_address').value = '';
    });

    // Delegated events on suppliers table
    supTbody.addEventListener('click', async (ev) => {
      const editBtn = ev.target.closest('.editSupplierBtn');
      if (editBtn) {
        const id = editBtn.dataset.id;
        openEditSupplier(id);
        return;
      }
      const delBtn = ev.target.closest('.delSupplierBtn');
      if (delBtn) {
        const id = delBtn.dataset.id;
        if (!confirm('Delete supplier? This will not delete medicines but will remove supplier link.')) return;
        try {
          const res = await fetch(API_BASE + '/suppliers/' + id, { method: 'DELETE' });
          const j = await res.json();
          if (!res.ok) throw new Error(j.error || 'Delete failed');
          showMsg(supTableMsg, 'success', 'Supplier deleted');
          loadSuppliers();
        } catch (e) {
          showMsg(supTableMsg, 'danger', e.message);
        }
        return;
      }
    });

    // Open Edit modal
    async function openEditSupplier(id) {
      try {
        const res = await fetch(API_BASE + '/suppliers/' + id);
        const s = await res.json();
        if (!res.ok) throw new Error(s.error || 'Not found');
        document.getElementById('edit_supplier_id').value = s.supplier_id;
        document.getElementById('edit_s_name').value = s.name || '';
        document.getElementById('edit_s_contact').value = s.contact || '';
        document.getElementById('edit_s_email').value = s.email || '';
        document.getElementById('edit_s_address').value = s.address || '';
        const modal = new bootstrap.Modal(document.getElementById('editSupplierModal'));
        modal.show();
      } catch (e) {
        showMsg(supTableMsg, 'danger', e.message);
      }
    }

    // Save edit
    document.getElementById('saveSupplierEdit').addEventListener('click', async () => {
      const id = document.getElementById('edit_supplier_id').value;
      const data = {
        name: document.getElementById('edit_s_name').value.trim(),
        contact: document.getElementById('edit_s_contact').value.trim(),
        email: document.getElementById('edit_s_email').value.trim(),
        address: document.getElementById('edit_s_address').value.trim()
      };
      try {
        const res = await fetch(API_BASE + '/suppliers/' + id, {
          method: 'PUT',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify(data)
        });
        const j = await res.json();
        if (!res.ok) throw new Error(j.error || 'Update failed');
        showMsg(document.getElementById('editSupplierMsg'), 'success', 'Updated');
        setTimeout(() => { bootstrap.Modal.getInstance(document.getElementById('editSupplierModal')).hide(); loadSuppliers(); }, 700);
      } catch (e) {
        showMsg(document.getElementById('editSupplierMsg'), 'danger', e.message);
      }
    });

    // Search filter
    document.getElementById('supplierSearch').addEventListener('input', async (e) => {
      const q = e.target.value.trim().toLowerCase();
      const rows = Array.from(supTbody.querySelectorAll('tr'));
      rows.forEach(r => {
        const txt = r.textContent.toLowerCase();
        r.style.display = txt.includes(q) ? '' : 'none';
      });
    });

    // init
    loadSuppliers();

    // Listen for cross-tab supplier updates and reload table
    window.addEventListener('storage', (e) => {
      if (e.key === 'mt_refresh_suppliers') loadSuppliers();
    });
  </script>
</body>
</html>
