<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Scanner • Medicine Tracker</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar fixed-top" 
  style="background: linear-gradient(90deg,#10b981,#059669); box-shadow:0 6px 18px rgba(0,0,0,.06);">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="navbar-brand text-white fw-bold" href="dashboard.html">Medicine Tracker</a>

    <div class="d-none d-md-flex gap-2">
      <a class="btn btn-sm btn-outline-light" href="dashboard.html">Dashboard</a>
      <a class="btn btn-sm btn-outline-light" href="view_medicines.html">View Medicines</a>
      <a class="btn btn-sm btn-outline-light" href="add_medicine.html">Add Medicine</a>
      <a class="btn btn-sm btn-outline-light" href="suppliers.html">Suppliers</a>
      <a class="btn btn-sm btn-outline-light" href="alerts.html">Alerts</a>
    </div>

    <div class="d-flex gap-2 align-items-center">
      <span id="navUser" class="text-white me-2 d-none d-md-inline"></span>
      <button class="btn btn-outline-light btn-sm" onclick="logoutAndRedirect()">Logout</button>
      <button class="btn btn-light btn-sm d-md-none" id="mobileMenuBtn">Menu</button>
    </div>
  </div>
</nav>

<div class="fixed-top-spacer"></div>

<!-- PAGE CONTENT -->
<div class="container mt-4">

  <h2 class="fw-bold">Barcode Scanner (POS Mode)</h2>
  <p class="text-muted">Scan medicine barcodes using your device camera or manually enter a code.</p>

  <div class="row g-4">

    <!-- CAMERA / SCANNER PANEL -->
    <div class="col-md-6">
      <div class="card p-3">
        <h5 class="mb-3">Camera Scanner</h5>

        <div class="text-center mb-3">
          <video id="video" autoplay playsinline style="width:100%; max-height:300px; border-radius:10px; background:#000;"></video>
        </div>

        <div class="d-flex gap-2">
          <button id="startBtn" class="btn btn-success w-50">Start Scanner</button>
          <button id="stopBtn" class="btn btn-danger w-50">Stop</button>
        </div>

        <div id="scannerMsg" class="mt-3"></div>

        <hr>

        <!-- MANUAL LOOKUP -->
        <h6>Manual Barcode Entry</h6>
        <div class="input-group">
          <input id="manualBarcode" class="form-control" placeholder="Enter barcode manually">
          <button id="manualLookup" class="btn btn-primary">Find</button>
        </div>
      </div>
    </div>

    <!-- CART PANEL -->
    <div class="col-md-6">
      <div class="card p-3">
        <h5 class="mb-3">Cart</h5>

        <div class="table-responsive">
          <table class="table table-sm">
            <thead class="table-light">
              <tr>
                <th>Name</th>
                <th>Qty</th>
                <th>Price</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cartBody"></tbody>
          </table>
        </div>

        <div class="text-end">
          <h5>Total: ₹ <span id="cartTotal">0.00</span></h5>
        </div>

        <button id="checkoutBtn" class="btn btn-primary w-100 mt-3">Checkout</button>
        <div id="cartMsg" class="mt-3"></div>
      </div>
    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script src="js/scanner.js"></script>

</body>
</html>
